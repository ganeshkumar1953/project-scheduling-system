spring.application.name=scheduling-backend

# MySQL DataSource
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/scheduling_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:ganesh1953}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson - serialize dates as ISO strings, not timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

# Server
server.port=${PORT:8080}
