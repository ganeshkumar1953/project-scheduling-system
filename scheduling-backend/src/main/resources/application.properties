spring.application.name=scheduling-backend

# MySQL DataSource
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/scheduling_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson - serialize dates as ISO strings, not timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

# Server
server.port=${PORT:8080}

# Email Configuration (Gmail SMTP via JavaMailSender)
# Set MAIL_USERNAME and MAIL_PASSWORD environment variables in Railway (or your platform).
# MAIL_PASSWORD must be a Gmail App Password (not your account password).
# Generate one at: https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:kumarganesh6092@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Admin Credentials (simple static auth)
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:}
